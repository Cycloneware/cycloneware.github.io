<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CycloneWare - Login</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            text-align: center;
            margin: 100px auto;
            padding: 20px;
            background: #333;
            border-radius: 10px;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
        .login-container h2 {
            margin-bottom: 20px;
        }
        .g-signin2 {
            display: inline-block;
        }
        .logout-btn {
            display: none;
            padding: 10px 20px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <header>
        <h1>CycloneWare</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="games.html">Games</a></li>
                <li><a href="community.html">Community</a></li>
                <li id="login-menu"><a href="login.html">Login</a></li>
                <li><button id="logout-btn" class="logout-btn">Logout</button></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="login-container">
            <h2>Login with Google</h2>
            <div id="g_id_onload"
                data-client_id="461434289159-ga3odshnftie2n8g15tl28lgrgtoriib.apps.googleusercontent.com"
                data-callback="handleCredentialResponse"
                data-auto_prompt="true">
            </div>
            <div class="g_id_signin"
                data-type="standard"
                data-shape="rectangular"
                data-theme="outline"
                data-text="sign_in_with"
                data-size="large"
                data-logo_alignment="left">
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 CycloneWare. All rights reserved.</p>
    </footer>
    <script>
        // Handle login response
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);

            // Decode and process the token (if needed)
            const decoded = parseJwt(response.credential);
            console.log("User Info:", decoded);

            // Save the login state
            localStorage.setItem("user", JSON.stringify(decoded));
            
            // Redirect to dashboard
            window.location.href = "dashboard.html";
        }

        // Decode JWT token (optional for debugging)
        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(atob(base64));
        }

        // Show/hide login and logout buttons based on login state
        function updateUI() {
            const user = localStorage.getItem("user");
            const loginMenu = document.getElementById("login-menu");
            const logoutBtn = document.getElementById("logout-btn");

            if (user) {
                loginMenu.style.display = "none";
                logoutBtn.style.display = "inline-block";
            } else {
                loginMenu.style.display = "inline-block";
                logoutBtn.style.display = "none";
            }
        }

        // Logout functionality
        document.getElementById("logout-btn").addEventListener("click", () => {
            localStorage.removeItem("user");
            updateUI();
            alert("You have logged out.");
            window.location.href = "index.html"; // Redirect to homepage
        });

        // Initialize UI on page load
        window.onload = updateUI;
    </script>
</body>
</html>
